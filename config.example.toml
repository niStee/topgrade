#==============================================================================
# Topgrade Configuration File
#
# This file controls how Topgrade behaves when updating your system.
# Uncomment and modify options as needed to customize your update experience.
#==============================================================================

#------------------------------------------------------------------------------
# INCLUDES
# Additional configuration files to process before this one
#------------------------------------------------------------------------------
[include]
# Files in $CONFIG_DIR/topgrade.d/ are automatically included before this file
# paths = ["/etc/topgrade.toml"]

#------------------------------------------------------------------------------
# CORE SETTINGS
# Most commonly adjusted settings that control overall behavior
#------------------------------------------------------------------------------
[misc]
# Run specific steps only (overrides disable) - uncomment to use
# only = ["system", "package_managers"]

# Disable specific steps - uncomment and modify list as needed
# disable = ["system", "emacs"]

# Ignore failures for these steps and continue execution
# ignore_failures = ["powershell"]

# Don't ask for confirmations (use with caution)
# assume_yes = false

# Don't ask to retry failed steps
# no_retry = false

# Whether to self update Topgrade (ignored if built without self-update support)
# no_self_update = false

# Set the preferred language (default: system language)
# Supported values: see the ./locales directory for available languages
# lang = "en"

# Cleanup temporary or old files after updating
# cleanup = false

#------------------------------------------------------------------------------
# NOTIFICATION & UI SETTINGS
# Control how Topgrade communicates and displays information
#------------------------------------------------------------------------------
[misc]
# Do not set the terminal title
# set_title = true

# Display the time in step titles
# display_time = true

# Send a notification for every step
# notify_each_step = false

# Skip sending a notification at the end of a run
# skip_notify = false

# Run inside tmux
# run_in_tmux = false

# How Topgrade interacts with tmux sessions
# Values: "attach_if_not_in_session", "attach_always"
# tmux_session_mode = "attach_if_not_in_session"

# Arguments to pass tmux when pulling Repositories
# tmux_arguments = "-S /var/tmux.sock"

# Extra tracing filter directives for debugging
# log_filters = ["topgrade::command=debug", "warn"]

#------------------------------------------------------------------------------
# SUDO SETTINGS
# Control sudo behavior during updates
#------------------------------------------------------------------------------
[misc]
# Run `sudo -v` to cache credentials at the start of the run
# This avoids password prompts during unattended updates
# pre_sudo = false

# Sudo command to be used
# sudo_command = "sudo"

#------------------------------------------------------------------------------
# GIT & REPOSITORIES
# Settings for git repositories and version control systems
#------------------------------------------------------------------------------
[git]
# Maximum number of repositories to pull in parallel
max_concurrency = 5

# Additional git repositories to pull
# repos = [
#   "~/src/*/",
#   "~/.config/something" 
# ]

# Don't pull the predefined git repos
# pull_predefined = false

# Arguments to pass Git when pulling Repositories
arguments = "--rebase --autostash"

#------------------------------------------------------------------------------
# COMMON PACKAGE MANAGERS
# Settings for frequently used package managers across platforms
#------------------------------------------------------------------------------
[brew]
# Upgrade formulae built from the HEAD branch
# fetch_head = false

# Execute brew autoremove after upgrading
autoremove = true

# For BrewCask: use the -a option if RCU exists, otherwise --greedy
# greedy_cask = true

[npm]
# Use sudo if the NPM directory isn't owned by the current user
# use_sudo = false

[python]
# Enable pip-review for updating Python packages
# enable_pip_review = false

# Enable pip-review for local packages
# enable_pip_review_local = false

# Enable pipupgrade for updating Python packages
# enable_pipupgrade = false
# pipupgrade_arguments = "-y -u --pip-path pip"

#------------------------------------------------------------------------------
# PLATFORM SPECIFIC: LINUX
# Settings specific to Linux systems
#------------------------------------------------------------------------------
[linux]
# Arch Package Manager to use
# Values: autodetect, aura, garuda_update, pacman, pamac, paru, pikaur, trizen, yay
# arch_package_manager = "pacman"

# Arguments for specific package managers
# yay_arguments = "--nodevel"
# dnf_arguments = "--refresh"

# Enable distribution-specific features
# show_arch_news = true
# enable_tlmgr = false
# redhat_distro_sync = false
# suse_dup = false

#------------------------------------------------------------------------------
# PLATFORM SPECIFIC: WINDOWS
# Settings specific to Windows systems
#------------------------------------------------------------------------------
[windows]
# Manually select Windows updates instead of automatically installing all
# accept_all_updates = false

# Open remote connections in a new terminal
# open_remotes_in_new_terminal = true

# Update WSL
# wsl_update_pre_release = false
# wsl_update_use_web_download = false

# Install Winget packages silently (without prompts)
# winget_install_silently = true

# Allow Topgrade to rename itself during updates
# Use this if you installed Topgrade via a package manager (Scoop/Cargo)
# self_rename = false

#------------------------------------------------------------------------------
# PLATFORM SPECIFIC: CONTAINERS & VIRTUAL ENVIRONMENTS
#------------------------------------------------------------------------------
[containers]
# Specify containers to ignore while updating (wildcard supported)
# ignored_containers = ["ghcr.io/rancher-sandbox/rancher-desktop/rdx-proxy:latest", "docker.io*"]

# Specify the runtime to use for containers
# Values: "docker", "podman"
# runtime = "docker"

[distrobox]
# use_root = false
# containers = ["archlinux-latest"]

[vagrant]
# Vagrant directories to update
# directories = []

# Power on vagrant boxes if needed
# power_on = false

# Always suspend vagrant boxes instead of powering off
# always_suspend = false

#------------------------------------------------------------------------------
# COMMAND EXECUTION
# Pre-commands, post-commands, and custom commands to run during updates
#------------------------------------------------------------------------------
# Commands to run before anything
[pre_commands]
# "Emacs Backup" = "rm -rf ~/.emacs.d/elpa.bak && cp -rl ~/.emacs.d/elpa ~/.emacs.d/elpa.bak"

# Commands to run after anything
[post_commands]
# "Cleanup" = "rm -rf /tmp/update-artifacts"

# Custom commands to run as part of the update process
[commands]
# "Python Environment" = "~/dev/.env/bin/pip install -U jupyter"
# "Custom command using interactive shell (unix)" = "-i vim_upgrade"

#------------------------------------------------------------------------------
# EDITOR & DEVELOPMENT TOOLS
# Settings for editors, IDEs, and development environments
#------------------------------------------------------------------------------
[vim]
# For vim-plug, execute PlugUpdate! instead of PlugUpdate
# force_plug_update = false

[vscode]
# Specify the profile to update extensions for (if using VS Code profiles)
# profile = ""

[deno]
# Upgrade deno executable to the given version
# version = "stable"

#------------------------------------------------------------------------------
# SPECIALIZED PACKAGE MANAGERS
# Less commonly used package managers and language-specific tools
#------------------------------------------------------------------------------
[composer]
# self_update = true

[julia]
# Run Julia with the startup file loaded (loads packages via "using" directives)
# startup_file = true

[flatpak]
# Use sudo for updating system-wide Flatpak installations
# use_sudo = false

[zigup]
# Version strings passed to zigup
# target_versions = ["master"]
# install_dir = "~/.zig"
# path_link = "~/.bin/zig"
# cleanup = false

[firmware]
# Offer to update firmware (if false, just check for updates)
# upgrade = false

[lensfun]
# Update lensfun database system-wide (requires sudo)
# use_sudo = false

